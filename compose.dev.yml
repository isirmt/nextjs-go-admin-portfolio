services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pg_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d appdb" ]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.dev
    environment:
      NODE_ENV: development
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      BACKEND_BASE_URL: http://backend:4000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS}
      ADMIN_SECRET: ${ADMIN_SECRET}
      AUTH_TRUST_HOST: true
      GOOGLE_TAG_MANAGER_ID: ${GOOGLE_TAG_MANAGER_ID}
    volumes:
      - ./frontend:/app
      - node_modules_dev:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  backend:
    image: golang:1.23-bookworm
    working_dir: /app
    command: [ "bash", "-c", "go mod download && go install github.com/air-verse/air@v1.52.3 && air -c .air.toml" ]
    environment:
      DATABASE_URL: "postgres://app:app_password@db:5432/appdb"
      ALLOWED_ORIGIN: "http://localhost:3000"
      ADMIN_SECRET: ${ADMIN_SECRET}
      UPLOAD_DIR: /uploads
      EMBEDDING_BASE_URL: http://embedding:8000
      SEARCH_EMBEDDING_MODEL: intfloat/multilingual-e5-small
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
      - ./uploads:/uploads
    depends_on:
      db:
        condition: service_healthy

  embedding:
    build:
      context: ./embedding
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgres://app:app_password@db:5432/appdb"
      EMBEDDING_MODEL: intfloat/multilingual-e5-small
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: /hf-cache
      REINDEX_INTERVAL_SECONDS: ${REINDEX_INTERVAL_SECONDS:-600}
    volumes:
      - hf_cache_dev:/hf-cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    image: migrate/migrate:4
    command: ["-path", "/migrations", "-database", "postgres://app:app_password@db:5432/appdb?sslmode=disable", "up"]
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    ports:
      - "3000:3000"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      web:
        condition: service_started
      backend:
        condition: service_started

volumes:
  pg_dev:
  node_modules_dev:
  go_mod_cache:
  hf_cache_dev:
