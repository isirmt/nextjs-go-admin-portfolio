services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_prod:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  web:
    image: ghcr.io/isirmt/nextjs-go-admin-portfolio-web:latest
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS}
      ADMIN_SECRET: ${ADMIN_SECRET}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      GOOGLE_TAG_MANAGER_ID: ${GOOGLE_TAG_MANAGER_ID}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ghcr.io/isirmt/nextjs-go-admin-portfolio-backend:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      ADMIN_SECRET: ${ADMIN_SECRET}
      UPLOAD_DIR: /uploads
      EMBEDDING_BASE_URL: http://embedding:8000
      SEARCH_EMBEDDING_MODEL: intfloat/multilingual-e5-small
    volumes:
      - ./uploads:/uploads
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      embedding:
        condition: service_healthy

  embedding:
    image: ghcr.io/isirmt/nextjs-go-admin-portfolio-embedding:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EMBEDDING_MODEL: intfloat/multilingual-e5-small
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: /hf-cache
      REINDEX_INTERVAL_SECONDS: ${REINDEX_INTERVAL_SECONDS:-600}
    volumes:
      - hf_cache:/hf-cache
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=5)\"" ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  migrate:
    image: migrate/migrate:4
    command: ["-path", "/migrations", "-database", "${DATABASE_URL}", "up"]
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  caddy:
    image: caddy:2
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      backend:
        condition: service_started

volumes:
  pg_prod:
  caddy_data:
  caddy_config:
  hf_cache:
