name: Deploy VM

on:
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Pull, migrate, and restart
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_APP_DIR: ${{ secrets.VM_APP_DIR }}
        run: |
          ssh "$VM_USER@$VM_HOST" "VM_APP_DIR='$VM_APP_DIR' bash -s" <<'SCRIPT'
          set -euo pipefail

          cd "$VM_APP_DIR"

          git fetch --prune
          git pull --ff-only

          docker compose -f compose.vm.yml pull
          docker compose -f compose.vm.yml up -d db
          docker compose -f compose.vm.yml run --rm migrate
          docker compose -f compose.vm.yml up -d
          docker compose -f compose.vm.yml ps
          SCRIPT
