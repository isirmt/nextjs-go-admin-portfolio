name: Deploy VM

on:
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Pull, migrate, and restart
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_APP_DIR: ${{ secrets.VM_APP_DIR }}
        run: |
          ssh "$VM_USER@$VM_HOST" "VM_APP_DIR='$VM_APP_DIR' bash -s" <<'SCRIPT'
          set -euo pipefail

          cd "$VM_APP_DIR"

          git fetch --prune
          git pull --ff-only

          COMPOSE_FILES="-f compose.vm.yml"

          if [ -f compose.vm.local.yml ]; then
            COMPOSE_FILES="$COMPOSE_FILES -f compose.vm.local.yml"
          fi

          docker compose $COMPOSE_FILES pull
          docker compose $COMPOSE_FILES up -d db
          docker compose $COMPOSE_FILES run --rm migrate
          echo "migrate completed"
          docker compose $COMPOSE_FILES up -d
          docker compose $COMPOSE_FILES ps

          docker system df
          docker image prune -f
          docker builder prune -f --filter "until=168h"
          docker system df

          SCRIPT
